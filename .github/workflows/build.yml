name: Build Desktop Apps

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows EXE
            os: windows-latest
            command: npm run dist:win
            artifact_name: EggArena-windows
            artifact_path: dist/*.exe
          - name: macOS App
            os: macos-latest
            command: npm run dist:mac
            artifact_name: EggArena-macos
            artifact_path: |
              dist/*.dmg
              dist/*.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
